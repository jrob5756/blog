name: Sync News Reports

on:
  # Triggered by news repo via repository_dispatch
  repository_dispatch:
    types: [news-updated]
  # Also on schedule as fallback
  schedule:
    - cron: '0 10 * * *'  # Daily at 10 AM UTC
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Sync all reports (not just today)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone news repo
        run: |
          git clone --depth 1 https://github.com/jrob5756/news.git /tmp/news

      - name: Sync reports to content/news/
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full_sync }}" = "true" ]; then
            echo "Full sync: all reports"
            python3 scripts/sync-news.py /tmp/news/reports content/news/
          else
            echo "Incremental sync: today only"
            python3 scripts/sync-news.py /tmp/news/reports content/news/ --today
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/news/
          git diff --staged --quiet || git commit -m "sync: update news reports"
          git push
