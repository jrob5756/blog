baseURL = "https://jasonrobert.dev/"
languageCode = "en-us"
title = "Jason Robert"
theme = "PaperMod"
paginate = 10

[params]
  description = "Principal Software Engineer — AI Tooling, Distributed Systems, Cloud Architecture"
  author = "Jason Robert"
  defaultTheme = "auto"  # dark/light follows system preference
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false
  ShowPageNums = true
  mainSections = ["blog"]
  ShowAllPagesInArchive = true

  [params.profileMode]
    enabled = true
    title = "Jason Robert"
    subtitle = "Design. Build. Teach.\n\n---\n\nSoftware engineer writing about distributed systems, AI tooling, and the craft of building software."

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/blog/"

    [[params.profileMode.buttons]]
      name = "News"
      url = "/news/"

    [[params.profileMode.buttons]]
      name = "About"
      url = "/about/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jrob5756"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/jasonrobert/"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://x.com/jasontrobert"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 10

  [[menu.main]]
    identifier = "news"
    name = "News"
    url = "/news/"
    weight = 20

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

  [[menu.main]]
    identifier = "archive"
    name = "Archive"
    url = "/archive/"
    weight = 35

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true
    guessSyntax = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
    [markup.goldmark.extensions]
      footnote = true
      strikethrough = true
      table = true
      taskList = true

[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON for search

[taxonomies]
  tag = "tags"
  category = "categories"
